<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- Página standalone para alumnos invitados: sin sesión, sin localStorage, y a propósito
     fuera del alcance del service worker de la app (ver la exclusión en sw.js) — un invitado
     sin conexión no tiene nada guardado para mostrar. CSS propio, sin depender de styles.css,
     mismo criterio que la landing (web/index.html): cada archivo standalone de este repo
     duplica sus estilos en vez de compartir hoja. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https://*.supabase.co; font-src 'self'; connect-src https://*.supabase.co; base-uri 'none'; form-action 'none'; object-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>Portal — Entreclases</title>
<meta name="description" content="Portal del alumno de Entreclases: consultá tu progreso y tus próximas clases con la llave que te compartió tu profe.">
<meta property="og:type" content="website">
<meta property="og:site_name" content="Entreclases">
<meta property="og:title" content="Portal — Entreclases">
<meta property="og:description" content="Portal del alumno de Entreclases: consultá tu progreso y tus próximas clases con la llave que te compartió tu profe.">
<meta property="og:image" content="https://entreclases.github.io/og-image.png">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:locale" content="es_AR">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="Portal — Entreclases">
<meta name="twitter:description" content="Portal del alumno de Entreclases: consultá tu progreso y tus próximas clases con la llave que te compartió tu profe.">
<meta name="twitter:image" content="https://entreclases.github.io/og-image.png">
<style>
  @font-face{
    font-family:'Inter'; font-style:normal; font-weight:400 700; font-display:swap;
    src:url('fonts/inter-latin.woff2') format('woff2');
  }
  @font-face{
    font-family:'Poppins'; font-style:normal; font-weight:700; font-display:swap;
    src:url('fonts/poppins-700.woff2') format('woff2');
  }
  :root{
    --bg:#F6F8FC; --card:#FFFFFF; --ink:#12192E; --muted:#5C6480; --faint:#8B90A0;
    --line:#E4E9F5; --soft:#EEF1F9; --red:#EF4444; --redbg:#FEE2E2;
    --blue:#3B82F6; --green:#22C55E; --amber:#F59E0B;
    --navy:#1E2B4D; --navy-2:#2F4272; --accent:#14B8A6; --accent-dark:#0E9488; --accent-soft:#CFF7F0;
    --red-fg:#A23A2A;
    --subj-teal-fg:#0F766E; --subj-blue-fg:#1D4ED8; --subj-purple-fg:#6D28D9; --subj-amber-fg:#92400E;
    --subj-rose-fg:#BE123C; --subj-green-fg:#15803D; --subj-indigo-fg:#4338CA; --subj-slate-fg:#475569;
    --sans:'Inter',-apple-system,"Segoe UI",Roboto,"Helvetica Neue",Arial,sans-serif;
    --display:'Poppins',var(--sans);
    /* ============ fondo decorativo (paso 178): misma textura que la app, sin toggle acá (el
       portal no tiene preferencias) — bastante más tenue todavía, ver body::before más abajo. ============ */
    --bg-pattern: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='240'%20height='240'%20viewBox='0%200%20240%20240'%3E%3Cg%20fill='none'%20stroke='rgb(18,25,46)'%20stroke-width='1'%3E%3Cline%20x1='0'%20y1='40'%20x2='240'%20y2='40'/%3E%3Cline%20x1='0'%20y1='80'%20x2='240'%20y2='80'/%3E%3Cline%20x1='0'%20y1='120'%20x2='240'%20y2='120'/%3E%3Cline%20x1='0'%20y1='160'%20x2='240'%20y2='160'/%3E%3Cline%20x1='0'%20y1='200'%20x2='240'%20y2='200'/%3E%3Cline%20x1='30'%20y1='0'%20x2='30'%20y2='240'/%3E%3C/g%3E%3Ctext%20x='55'%20y='33'%20font-family='Georgia,serif'%20font-size='26'%20fill='rgb(18,25,46)'%3E&#8747;%3C/text%3E%3Ctext%20x='150'%20y='71'%20font-family='Georgia,serif'%20font-size='22'%20fill='rgb(18,25,46)'%3E&#960;%3C/text%3E%3Ctext%20x='42'%20y='112'%20font-family='Georgia,serif'%20font-size='20'%20fill='rgb(18,25,46)'%3E&#8730;%3C/text%3E%3Ctext%20x='185'%20y='150'%20font-family='Georgia,serif'%20font-size='24'%20fill='rgb(18,25,46)'%3E&#931;%3C/text%3E%3Cg%20stroke='rgb(18,25,46)'%20stroke-width='1.4'%20fill='none'%3E%3Cline%20x1='105'%20y1='165'%20x2='92'%20y2='197'/%3E%3Cline%20x1='105'%20y1='165'%20x2='118'%20y2='197'/%3E%3Cpath%20d='M97%20178%20Q105%20172%20113%20178'/%3E%3C/g%3E%3Ccircle%20cx='105'%20cy='165'%20r='2'%20fill='rgb(18,25,46)'/%3E%3C/svg%3E");
  }
  @media (prefers-color-scheme:dark){
    :root{
      --bg:#0F1420; --card:#1B2333; --ink:#EDEFF7; --muted:#A8ADBD; --faint:#7A8096;
      --line:#2B3348; --soft:#171D2C; --red:#FF6B6B; --redbg:#3A211D;
      --blue:#60A5FA; --green:#4ADE80; --amber:#FBBF24;
      --navy:#2B3A63; --navy-2:#3D5089; --accent:#2DD4C0; --accent-dark:#14B8A6; --accent-soft:#123C38;
      --red-fg:#E8A093;
      --subj-teal-fg:#5EEAD4; --subj-blue-fg:#93C5FD; --subj-purple-fg:#C4B5FD; --subj-amber-fg:#FBBF24;
      --subj-rose-fg:#FDA4AF; --subj-green-fg:#86EFAC; --subj-indigo-fg:#A5B4FC; --subj-slate-fg:#CBD5E1;
      --bg-pattern: url("data:image/svg+xml,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='240'%20height='240'%20viewBox='0%200%20240%20240'%3E%3Cg%20fill='none'%20stroke='rgb(237,239,247)'%20stroke-width='1'%3E%3Cline%20x1='0'%20y1='40'%20x2='240'%20y2='40'/%3E%3Cline%20x1='0'%20y1='80'%20x2='240'%20y2='80'/%3E%3Cline%20x1='0'%20y1='120'%20x2='240'%20y2='120'/%3E%3Cline%20x1='0'%20y1='160'%20x2='240'%20y2='160'/%3E%3Cline%20x1='0'%20y1='200'%20x2='240'%20y2='200'/%3E%3Cline%20x1='30'%20y1='0'%20x2='30'%20y2='240'/%3E%3C/g%3E%3Ctext%20x='55'%20y='33'%20font-family='Georgia,serif'%20font-size='26'%20fill='rgb(237,239,247)'%3E&#8747;%3C/text%3E%3Ctext%20x='150'%20y='71'%20font-family='Georgia,serif'%20font-size='22'%20fill='rgb(237,239,247)'%3E&#960;%3C/text%3E%3Ctext%20x='42'%20y='112'%20font-family='Georgia,serif'%20font-size='20'%20fill='rgb(237,239,247)'%3E&#8730;%3C/text%3E%3Ctext%20x='185'%20y='150'%20font-family='Georgia,serif'%20font-size='24'%20fill='rgb(237,239,247)'%3E&#931;%3C/text%3E%3Cg%20stroke='rgb(237,239,247)'%20stroke-width='1.4'%20fill='none'%3E%3Cline%20x1='105'%20y1='165'%20x2='92'%20y2='197'/%3E%3Cline%20x1='105'%20y1='165'%20x2='118'%20y2='197'/%3E%3Cpath%20d='M97%20178%20Q105%20172%20113%20178'/%3E%3C/g%3E%3Ccircle%20cx='105'%20cy='165'%20r='2'%20fill='rgb(237,239,247)'/%3E%3C/svg%3E");
    }
  }
  *{box-sizing:border-box}
  a:focus-visible,button:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
  @media (prefers-reduced-motion:reduce){*{transition:none!important}}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--sans);
       font-size:15px;line-height:1.5;padding:24px 16px 48px}
  /* Fondo decorativo (paso 178): siempre activo, más tenue que la app y la landing a propósito
     (el portal es lo primero que ve un alumno externo — la textura tiene que ser casi invisible). */
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image:var(--bg-pattern); background-repeat:repeat; background-size:220px 220px;
    opacity:.028;
  }
  .shell{max-width:520px;margin:0 auto}
  .brandhead{display:flex;align-items:center;gap:9px;margin-bottom:18px}
  .logo-mark{width:28px;height:28px;border-radius:8px;flex-shrink:0;
    background:linear-gradient(135deg,var(--navy),var(--navy-2));
    display:flex;align-items:center;justify-content:center}
  .logo-mark svg{width:14px;height:14px;display:block}
  .brandhead b{font-family:var(--display);font-weight:700;font-size:14px}
  .eyebrow{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint);margin-bottom:6px}
  h1{font-family:var(--display);font-weight:700;font-size:22px;margin:0 0 18px;letter-spacing:-.01em}
  .docente-foto{width:44px;height:44px;border-radius:50%;object-fit:cover;flex-shrink:0}
  .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin-bottom:14px}
  .ctitle{font-weight:600;font-size:14.5px;margin-bottom:6px}
  .empty{color:var(--faint);font-size:14px}
  .msg{text-align:center;padding:40px 16px}
  .msg .big{font-size:17px;font-weight:600;margin-bottom:8px}
  .msg .small{color:var(--muted);font-size:14px}
  .err{color:var(--red-fg);background:var(--redbg);border-radius:10px;padding:10px 14px;font-size:14px}
  #biblio-search{width:100%;font:inherit;font-size:16px;padding:9px 12px;margin:4px 0 10px;
    border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink)}
  #biblio-search:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  /* ============ "Pedir una clase" (paso 160): select/textarea, mismo look que #biblio-search ============ */
  .pinput{width:100%;font:inherit;font-size:15px;padding:9px 12px;
    border:1px solid var(--line);border-radius:9px;background:var(--bg);color:var(--ink);resize:vertical}
  .pinput:focus-visible{outline:2px solid var(--accent);outline-offset:1px}
  .subject + .subject{margin-top:14px;padding-top:14px;border-top:1px solid var(--soft)}
  .subjectname{font-weight:600;font-size:13px;color:var(--muted);margin-bottom:6px;display:flex;align-items:center;gap:7px}
  .subj-dot{width:9px;height:9px;border-radius:99px;display:inline-block;flex-shrink:0}
  .icon-inline{display:inline-flex;vertical-align:-3px;width:16px;height:16px}
  .icon-inline svg{width:100%;height:100%;display:block}
  .file{display:flex;align-items:center;justify-content:space-between;gap:10px;
    padding:9px 0;border-top:1px solid var(--soft)}
  .subjectname + .file{border-top:none}
  /* ============ sub-grupos por unidad dentro de una materia (paso 128), acordeón (paso 174) ============ */
  .unitgroup + .unitgroup{margin-top:8px}
  .unitgroupname{font-weight:600;font-size:12px;color:var(--faint);margin:10px 0 2px;cursor:pointer;
    display:flex;align-items:center;justify-content:space-between;gap:8px;padding:2px 0;list-style:none}
  .unitgroupname::-webkit-details-marker{display:none}
  .unitgroupname::after{content:"";width:6px;height:6px;border-right:2px solid var(--faint);
    border-bottom:2px solid var(--faint);transform:rotate(-45deg);transition:transform .15s;flex-shrink:0}
  .unitgroup[open] > .unitgroupname::after{transform:rotate(45deg)}
  .unitgroupcount{font-weight:400}
  .subjectname + .unitgroup .unitgroupname{margin-top:0}
  .unitgroupname + .file{border-top:none}
  .filemain{font-size:14px}
  .filemeta{font-size:12px;color:var(--faint);margin-top:2px}
  .dl{flex:0 0 auto;font-size:12.5px;font-weight:600;color:var(--accent);text-decoration:none;
    border:1px solid var(--line);border-radius:8px;padding:6px 12px;white-space:nowrap;
    display:inline-flex;align-items:center;justify-content:center;min-height:44px}
  .dl:hover{background:var(--soft)}
  .personal,.grupo{border-color:var(--accent)}
  /* ============ deuda destacada (paso 171): la tarjeta de pagos pasa a ir arriba de todo y con
     borde rojo cuando hay saldo pendiente, para que no pase desapercibida ============ */
  .deuda{border-color:var(--red)}
  .deuda .ctitle{color:var(--red-fg)}
  /* ============ "No puedo ir" (paso 172): mini-formulario en el lugar, sin navegar ============ */
  .cancel-panel{margin-top:8px;padding:10px;background:var(--soft);border-radius:9px}
  /* ============ "Reserva directa" (paso 173): agenda semanal, un botón por hueco ============ */
  .rsemday{margin:10px 0}
  .rsemday:first-child{margin-top:0}
  .rsemdate{font-size:12.5px;font-weight:600;color:var(--muted);margin-bottom:6px}
  .rsemslots{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
  .rslot{padding:6px 14px}
  .rslot:disabled{opacity:.5}
  .rmine{font-size:12px;font-weight:600;color:var(--accent-dark);background:var(--accent-soft);border-radius:8px;padding:6px 10px;white-space:nowrap}
  /* ============ avisos (paso 105): tarjeta destacada arriba de todo, con fecha ============ */
  .aviso{border-left:3px solid var(--accent);background:var(--accent-soft)}
  .avisotxt{font-size:14.5px;font-weight:600}
  .avisofecha{font-size:11.5px;color:var(--muted);margin-top:4px}
  .hello{font-size:18px;font-weight:700;margin-bottom:14px}
  .prow{margin-bottom:14px}
  .prow:last-child{margin-bottom:0}
  .plabel{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:4px}
  .pvalue{font-size:14px}
  .pmeta{font-size:12px;color:var(--faint);margin-top:2px}
  .pempty{font-size:14px;color:var(--faint)}
  .unitrow{margin:10px 0}
  .unitname{font-size:12.5px;margin-bottom:4px}
  .unitbarwrap{display:flex;align-items:center;gap:8px}
  .unitbar{flex:1;height:8px;background:var(--soft);border-radius:99px;overflow:hidden}
  .unitfill{height:100%;border-radius:99px}
  .unitstate{flex:0 0 auto;font-size:11.5px;min-width:72px;text-align:right}

  /* ============ animaciones (paso 100): entrada de tarjetas, barra de avance que crece al
     aparecer, hover/press en el botón de descarga — sólo transform/opacity ============ */
  @keyframes cardIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
  .card{animation:cardIn .3s cubic-bezier(.16,1,.3,1) backwards}
  .card:nth-of-type(2){animation-delay:.05s}
  .card:nth-of-type(3){animation-delay:.1s}
  .unitfill{transform:scaleX(0);transform-origin:left;transition:transform .5s cubic-bezier(.16,1,.3,1)}
  .unitfill.in{transform:none}
  .dl{transition:transform .1s ease,background-color .12s ease}
  .dl:active{transform:scale(.96)}
  @media (prefers-reduced-motion:reduce){
    .card,.unitfill{animation:none;transition:none;transform:none}
  }
</style>
</head>
<body>
<div class="shell">
  <div class="brandhead">
    <span class="logo-mark"><svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><path d="M20 6L9 17l-5-5"/></svg></span>
    <b>Entreclases</b>
  </div>
  <div id="app">
    <div class="msg"><div class="big">Cargando…</div></div>
  </div>
  <div style="text-align:center;font-size:11px;color:var(--faint);margin-top:22px">Entreclases — Vos enseñás, del resto nos ocupamos.<br><a href="../terminos.html" style="color:var(--faint);text-decoration:underline">Términos y privacidad</a></div>
</div>
<script src="js/portal.js"></script>
</body>
</html>
