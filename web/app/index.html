<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<!-- CSP vía meta (no hay servidor propio para mandarla por header — GitHub Pages es estático):
     frame-ancestors/sandbox/report-uri no valen acá (el spec los ignora en <meta>), por eso no
     están. ipc: / http://ipc.localhost es lo que pide Tauri v2 para su IPC interno cuando la
     CSP se escribe a mano en vez de vía tauri.conf.json (que auto-inyecta nonces propios). -->
<meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self'; font-src 'self'; manifest-src 'self'; worker-src 'self'; connect-src https://*.supabase.co https://api.github.com ipc: http://ipc.localhost; base-uri 'none'; form-action 'self'; object-src 'none';">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuaderno de seguimiento</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<meta name="theme-color" content="#1E2B4D">
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div class="shell" id="app"></div>

<script src="js/qrcode.js"></script>
<script src="js/config.js"></script>
<script src="js/helpers.js"></script>
<script src="js/auth.js"></script>
<script src="js/sync.js"></script>
<script src="js/views.js"></script>
<script src="js/events.js"></script>
</body>
</html>
